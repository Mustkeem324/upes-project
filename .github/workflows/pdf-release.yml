name: Build PDF

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDF build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-pdf.txt

      - name: Generate assignment PDF
        run: python scripts/build_pdf.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: integrated-assignment-pdf
          path: |
            dist/Mustkeem_Ahmad_Integrated_Assignment.pdf
            dist/integrated-assignment.html

      - name: Attach PDF to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Mustkeem_Ahmad_Integrated_Assignment.pdf
