<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#425466"/>
    </marker>
    <style>
      .title { font: 700 28px 'Times New Roman', serif; fill: #14324a; }
      .label { font: 600 18px 'Times New Roman', serif; fill: #14324a; }
      .small { font: 500 15px 'Times New Roman', serif; fill: #14324a; }
      .box1 { fill: #eaf4ff; stroke: #2c5e91; stroke-width: 2.5; rx: 14; ry: 14; }
      .box2 { fill: #eef8ef; stroke: #427a4b; stroke-width: 2.5; rx: 14; ry: 14; }
      .box3 { fill: #fff6e6; stroke: #b47b17; stroke-width: 2.5; rx: 14; ry: 14; }
      .box4 { fill: #f9ebf4; stroke: #9a4f82; stroke-width: 2.5; rx: 14; ry: 14; }
      .arrow { stroke: #425466; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="860" fill="#ffffff"/>
  <text x="700" y="50" text-anchor="middle" class="title">ShopEase Strategic Transformation Roadmap</text>

  <rect x="70" y="100" width="270" height="110" class="box1"/>
  <text x="205" y="145" text-anchor="middle" class="label">Current State</text>
  <text x="205" y="173" text-anchor="middle" class="small">Rapid growth, fragmented systems,</text>
  <text x="205" y="196" text-anchor="middle" class="small">retention pressure, service inconsistency</text>

  <rect x="420" y="100" width="260" height="110" class="box1"/>
  <text x="550" y="145" text-anchor="middle" class="label">Strategic Diagnosis</text>
  <text x="550" y="173" text-anchor="middle" class="small">PESTLE, Five Forces, SWOT, VRIO</text>
  <text x="550" y="196" text-anchor="middle" class="small">highlight structural misalignment</text>

  <line x1="340" y1="155" x2="420" y2="155" class="arrow"/>

  <rect x="780" y="70" width="250" height="85" class="box3"/>
  <text x="905" y="110" text-anchor="middle" class="label">Declining Retention</text>
  <text x="905" y="133" text-anchor="middle" class="small">Weak loyalty and churn risk</text>

  <rect x="1080" y="70" width="250" height="85" class="box3"/>
  <text x="1205" y="110" text-anchor="middle" class="label">Operational Inefficiency</text>
  <text x="1205" y="133" text-anchor="middle" class="small">Delays, stockouts, service friction</text>

  <rect x="780" y="185" width="250" height="85" class="box3"/>
  <text x="905" y="225" text-anchor="middle" class="label">Reputational Risk</text>
  <text x="905" y="248" text-anchor="middle" class="small">Negative reviews and social complaints</text>

  <rect x="1080" y="185" width="250" height="85" class="box3"/>
  <text x="1205" y="225" text-anchor="middle" class="label">Leadership Uncertainty</text>
  <text x="1205" y="248" text-anchor="middle" class="small">Low visibility into sustainable growth</text>

  <line x1="680" y1="135" x2="780" y2="112" class="arrow"/>
  <line x1="680" y1="145" x2="1080" y2="112" class="arrow"/>
  <line x1="680" y1="165" x2="780" y2="227" class="arrow"/>
  <line x1="680" y1="175" x2="1080" y2="227" class="arrow"/>

  <rect x="120" y="330" width="320" height="110" class="box2"/>
  <text x="280" y="375" text-anchor="middle" class="label">Unified Data and Analytics Platform</text>
  <text x="280" y="403" text-anchor="middle" class="small">Customer 360, supply chain integration,</text>
  <text x="280" y="426" text-anchor="middle" class="small">pricing visibility, governed metrics</text>

  <rect x="540" y="330" width="320" height="110" class="box2"/>
  <text x="700" y="375" text-anchor="middle" class="label">NLP Voice-of-Customer Intelligence</text>
  <text x="700" y="403" text-anchor="middle" class="small">Sentiment, complaint themes, urgency,</text>
  <text x="700" y="426" text-anchor="middle" class="small">issue extraction, early-warning alerts</text>

  <rect x="960" y="330" width="320" height="110" class="box2"/>
  <text x="1120" y="375" text-anchor="middle" class="label">Executive Decision Dashboard</text>
  <text x="1120" y="403" text-anchor="middle" class="small">Strategic control, performance tracking,</text>
  <text x="1120" y="426" text-anchor="middle" class="small">faster cross-functional decisions</text>

  <line x1="905" y1="155" x2="330" y2="330" class="arrow"/>
  <line x1="1205" y1="155" x2="330" y2="330" class="arrow"/>
  <line x1="905" y1="270" x2="700" y2="330" class="arrow"/>
  <line x1="1205" y1="270" x2="1120" y2="330" class="arrow"/>

  <rect x="190" y="540" width="300" height="105" class="box4"/>
  <text x="340" y="583" text-anchor="middle" class="label">Predictive and Decision Analytics</text>
  <text x="340" y="611" text-anchor="middle" class="small">Churn, demand, pricing, delay,</text>
  <text x="340" y="634" text-anchor="middle" class="small">service recovery prioritization</text>

  <rect x="560" y="540" width="300" height="105" class="box4"/>
  <text x="710" y="583" text-anchor="middle" class="label">Trust-Led Profitable Growth</text>
  <text x="710" y="611" text-anchor="middle" class="small">Higher retention, better service,</text>
  <text x="710" y="634" text-anchor="middle" class="small">improved margin quality</text>

  <rect x="930" y="540" width="300" height="105" class="box4"/>
  <text x="1080" y="583" text-anchor="middle" class="label">Sustainable Advantage</text>
  <text x="1080" y="611" text-anchor="middle" class="small">Faster learning, lower friction,</text>
  <text x="1080" y="634" text-anchor="middle" class="small">stronger brand trust and resilience</text>

  <line x1="280" y1="440" x2="340" y2="540" class="arrow"/>
  <line x1="700" y1="440" x2="340" y2="540" class="arrow"/>
  <line x1="1120" y1="440" x2="340" y2="540" class="arrow"/>
  <line x1="490" y1="592" x2="560" y2="592" class="arrow"/>
  <line x1="860" y1="592" x2="930" y2="592" class="arrow"/>

  <text x="700" y="770" text-anchor="middle" class="small">Consulting view: move from fragmented scale to analytics-enabled, trust-centered operating excellence.</text>
</svg>
