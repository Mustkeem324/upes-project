<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px 'Times New Roman', serif; fill: #153147; }
      .label { font: 600 18px 'Times New Roman', serif; fill: #153147; }
      .small { font: 500 15px 'Times New Roman', serif; fill: #153147; }
      .dash { fill: #fbfcfe; stroke: #294f74; stroke-width: 2.6; rx: 18; ry: 18; }
      .banner { fill: #eaf4ff; stroke: #2e6398; stroke-width: 2.3; rx: 14; ry: 14; }
      .panel1 { fill: #eef8ef; stroke: #4a8a45; stroke-width: 2.3; rx: 14; ry: 14; }
      .panel2 { fill: #fff5e7; stroke: #b67a18; stroke-width: 2.3; rx: 14; ry: 14; }
      .panel3 { fill: #f8edf7; stroke: #95508a; stroke-width: 2.3; rx: 14; ry: 14; }
      .panel4 { fill: #f2f2f2; stroke: #64707a; stroke-width: 2.3; rx: 14; ry: 14; }
      .metric { fill: #ffffff; stroke: #9fb5c8; stroke-width: 1.5; rx: 10; ry: 10; }
    </style>
  </defs>
  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>
  <text x="700" y="50" text-anchor="middle" class="title">Conceptual Executive Dashboard for ShopEase</text>

  <rect x="70" y="90" width="1260" height="740" class="dash"/>

  <rect x="110" y="125" width="1180" height="120" class="banner"/>
  <text x="700" y="165" text-anchor="middle" class="label">Top Banner: Strategic Health</text>
  <rect x="145" y="185" width="180" height="40" class="metric"/>
  <text x="235" y="210" text-anchor="middle" class="small">Revenue Growth</text>
  <rect x="345" y="185" width="180" height="40" class="metric"/>
  <text x="435" y="210" text-anchor="middle" class="small">Contribution Margin</text>
  <rect x="545" y="185" width="180" height="40" class="metric"/>
  <text x="635" y="210" text-anchor="middle" class="small">Repeat Purchase Rate</text>
  <rect x="745" y="185" width="180" height="40" class="metric"/>
  <text x="835" y="210" text-anchor="middle" class="small">Net Retention</text>
  <rect x="945" y="185" width="150" height="40" class="metric"/>
  <text x="1020" y="210" text-anchor="middle" class="small">Sentiment Index</text>
  <rect x="1115" y="185" width="140" height="40" class="metric"/>
  <text x="1185" y="210" text-anchor="middle" class="small">OTD Rate</text>

  <rect x="110" y="280" width="300" height="240" class="panel1"/>
  <text x="260" y="320" text-anchor="middle" class="label">Regional and Operations View</text>
  <text x="260" y="355" text-anchor="middle" class="small">Regional heatmap</text>
  <text x="260" y="385" text-anchor="middle" class="small">Hub delay intensity</text>
  <text x="260" y="415" text-anchor="middle" class="small">Stockout rate and courier score</text>
  <text x="260" y="445" text-anchor="middle" class="small">Returns and refund turnaround</text>

  <rect x="440" y="280" width="430" height="240" class="panel2"/>
  <text x="655" y="320" text-anchor="middle" class="label">Trend and Performance Center</text>
  <text x="655" y="355" text-anchor="middle" class="small">Retention trend lines</text>
  <text x="655" y="385" text-anchor="middle" class="small">Complaint volume by week</text>
  <text x="655" y="415" text-anchor="middle" class="small">Category-level margin and return burden</text>
  <text x="655" y="445" text-anchor="middle" class="small">Cohort retention and CLV movement</text>

  <rect x="900" y="280" width="390" height="240" class="panel3"/>
  <text x="1095" y="320" text-anchor="middle" class="label">Customer and Reputation Insights</text>
  <text x="1095" y="355" text-anchor="middle" class="small">Complaint taxonomy</text>
  <text x="1095" y="385" text-anchor="middle" class="small">Top negative themes</text>
  <text x="1095" y="415" text-anchor="middle" class="small">Churn-risk segments</text>
  <text x="1095" y="445" text-anchor="middle" class="small">Escalation and reputation alerts</text>

  <rect x="110" y="555" width="740" height="225" class="panel4"/>
  <text x="480" y="595" text-anchor="middle" class="label">Decision Support and Forecasting</text>
  <text x="480" y="630" text-anchor="middle" class="small">Demand forecast by category and region</text>
  <text x="480" y="660" text-anchor="middle" class="small">Scenario analysis for pricing, loyalty, and logistics investment</text>
  <text x="480" y="690" text-anchor="middle" class="small">Recommended actions for high-risk regions, hubs, and customer segments</text>
  <text x="480" y="720" text-anchor="middle" class="small">Threshold-based executive exception management</text>

  <rect x="880" y="555" width="410" height="225" class="panel1"/>
  <text x="1085" y="595" text-anchor="middle" class="label">Action Queue</text>
  <text x="1085" y="630" text-anchor="middle" class="small">Prioritize delayed orders in North region</text>
  <text x="1085" y="660" text-anchor="middle" class="small">Trigger churn retention campaign for Tier-2 cohort</text>
  <text x="1085" y="690" text-anchor="middle" class="small">Audit pricing mismatch in electronics</text>
  <text x="1085" y="720" text-anchor="middle" class="small">Escalate refund complaints crossing threshold</text>

  <text x="700" y="865" text-anchor="middle" class="small">Designed for different stakeholders: CXOs, operations managers, marketing teams, and customer-service leadership.</text>
</svg>
